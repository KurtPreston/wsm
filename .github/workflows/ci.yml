name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 1.20 is the supported floor (matches go.mod; the kin-openapi contract
        # test needs sync.Map.CompareAndSwap, added in Go 1.20). GOTOOLCHAIN=local
        # means this job fails loudly if the go directive is ever bumped above the
        # floor or a newer stdlib feature sneaks in. "stable" catches the other end.
        go-version: ["1.20", "stable"]
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Build applications
        run: go build ./apps/...
      - name: Vet
        run: go vet ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
      - name: Run tests
        run: go test ./...
